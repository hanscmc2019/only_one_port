<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <title>EShopper - Carrito</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="tienda, ecommerce, productos" name="keywords">
    <meta content="Tienda EShopper" name="description">

    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/style.css" rel="stylesheet">
    <link href="css/theme.css" rel="stylesheet">
</head>

<body>
    <div id="topbar-placeholder"></div>


    <div id="navbar-placeholder"></div>


    <!-- Page Header Start -->
    <div class="container-fluid bg-secondary mb-5">
        <div class="d-flex flex-column align-items-center justify-content-center" style="min-height: 150px">
            <h1 class="font-weight-semi-bold text-uppercase mb-3">Carrito de Compras</h1>
            <div class="d-inline-flex">
                <p class="m-0"><a href="index.html">Inicio</a></p>
                <p class="m-0 px-2">-</p>
                <p class="m-0">Carrito</p>
            </div>
        </div>
    </div>
    <!-- Page Header End -->


    <!-- Cart Start -->
    <div class="container-fluid pt-5">
        <div class="row px-xl-5">
            <div class="col-lg-8 table-responsive mb-5">
                <table class="table table-bordered text-center mb-0">
                    <thead class="bg-secondary text-dark">
                        <tr>
                            <th>Products</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Total</th>
                            <th>Remove</th>
                        </tr>
                    </thead>
                    <tbody class="align-middle" id="cart-tbody">
                        <tr>
                            <td colspan="5" class="text-center py-5"><i class="fa fa-spinner fa-spin text-primary"></i>
                                Cargando carrito...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="col-lg-4">
                <form class="mb-5" action="">
                    <div class="input-group">
                        <input type="text" class="form-control p-4" placeholder="Coupon Code">
                        <div class="input-group-append">
                            <button class="btn btn-primary">Apply Coupon</button>
                        </div>
                    </div>
                </form>
                <div class="card border-secondary mb-5">
                    <div class="card-header bg-secondary border-0">
                        <h4 class="font-weight-semi-bold m-0">Cart Summary</h4>
                    </div>
                    <div class="card-body">
                        <div class="d-flex justify-content-between mb-3 pt-1">
                            <h6 class="font-weight-medium">Subtotal</h6>
                            <h6 class="font-weight-medium" id="cart-subtotal">S/ 0.00</h6>
                        </div>
                        <!-- COMENTADO TEMPORALMENTE (Para uso futuro)
                        <div class="d-flex justify-content-between">
                            <h6 class="font-weight-medium">Shipping</h6>
                            <h6 class="font-weight-medium">S/ 10.00</h6>
                        </div>
                        -->
                    </div>
                    <div class="card-footer border-secondary bg-transparent">
                        <div class="d-flex justify-content-between mt-2">
                            <h5 class="font-weight-bold">Total</h5>
                            <h5 class="font-weight-bold" id="cart-total">S/ 10.00</h5>
                        </div>
                        <button class="btn btn-block btn-primary my-3 py-3"
                            onclick="checkoutWhatsApp()">Proceed To WhatsApp</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Cart End -->


    <div id="footer-placeholder"></div>


    <!-- Back to Top -->
    <a href="#" class="btn btn-primary back-to-top"><i class="fa fa-angle-double-up"></i></a>


    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
    <script src="lib/easing/easing.min.js"></script>
    <script src="lib/owlcarousel/owl.carousel.min.js"></script>


    <!-- Template Javascript -->
    <script src="js/main.js"></script>
    <script src="js/load_components.js"></script>

    <!-- Script para carrito dinámico -->
    <script>
        const API_URL = '/api';

        $(document).ready(function () {
            loadCart();
        });

        function loadCart() {
            $('#cart-tbody').html('<tr><td colspan="5" class="text-center py-5"><i class="fa fa-spinner fa-spin text-primary"></i> Cargando carrito...</td></tr>');
            $.ajax({
                url: `${API_URL}/cart/`,
                method: 'GET',
                success: function (cart) {
                    renderCart(cart);
                },
                error: function (xhr) {
                    $('#cart-tbody').html('<tr><td colspan="5" class="text-center py-5 text-danger">Error al cargar el carrito.</td></tr>');
                }
            });
        }

        function renderCart(cart) {
            const tbody = $('#cart-tbody');
            tbody.empty();

            if (!cart.items || cart.items.length === 0) {
                tbody.html('<tr><td colspan="5" class="text-center py-5">Tu carrito está vacío. <br><a href="index.html" class="btn btn-primary mt-3">Ir de Compras</a></td></tr>');
                $('#cart-subtotal').text('S/ 0.00');
                $('#cart-total').text('S/ 0.00');
                if (typeof updateCartBadge === 'function') updateCartBadge();
                return;
            }

            cart.items.forEach(item => {
                const imgUrl = imageUrl(item.image);
                const variantParts = [item.size, item.color].filter(Boolean);
                const variantHtml = variantParts.length
                    ? `<small class="d-block text-muted">${variantParts.join(' / ')}</small>` : '';
                const row = `
                    <tr>
                        <td class="align-middle text-left"><img src="${imgUrl}" alt="" style="width: 50px; height: 50px; object-fit: cover;" class="mr-3"> ${item.product_name}${variantHtml}</td>
                        <td class="align-middle">S/ ${item.price}</td>
                        <td class="align-middle">
                            <div class="input-group quantity mx-auto" style="width: 100px;">
                                <div class="input-group-btn">
                                    <button class="btn btn-sm btn-primary btn-minus" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">
                                        <i class="fa fa-minus"></i>
                                    </button>
                                </div>
                                <input type="text" class="form-control form-control-sm bg-secondary text-center" value="${item.quantity}" readonly>
                                <div class="input-group-btn">
                                    <button class="btn btn-sm btn-primary btn-plus" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">
                                        <i class="fa fa-plus"></i>
                                    </button>
                                </div>
                            </div>
                        </td>
                        <td class="align-middle">S/ ${item.subtotal}</td>
                        <td class="align-middle"><button class="btn btn-sm btn-primary" onclick="removeItem(${item.id})"><i class="fa fa-times"></i></button></td>
                    </tr>
                `;
                tbody.append(row);
            });

            // Update Totals
            const subtotal = cart.total;
            // const shipping = 10; // COMENTADO TEMPORALMENTE
            const shipping = 0;
            const total = subtotal + shipping;

            $('#cart-subtotal').text(`S/ ${subtotal}`);
            $('#cart-total').text(`S/ ${total}`);

            // Actualizar badge globalmente
            if (typeof updateCartBadge === 'function') updateCartBadge();
        }

        function updateQuantity(itemId, newQuantity) {
            if (newQuantity <= 0) {
                removeItem(itemId);
                return;
            }
            $.ajax({
                url: `${API_URL}/cart/update/${itemId}/`,
                method: 'PUT',
                contentType: 'application/json',
                data: JSON.stringify({ quantity: newQuantity }),
                success: function (cart) {
                    renderCart(cart);
                }
            });
        }

        function removeItem(itemId) {
            if (!confirm('¿Seguro que deseas remover este producto?')) return;
            $.ajax({
                url: `${API_URL}/cart/remove/${itemId}/`,
                method: 'DELETE',
                success: function (cart) {
                    renderCart(cart);
                }
            });
        }

        function checkoutWhatsApp() {
            // Cambiar texto a "Cargando..."
            const btn = $('button:contains("Proceed To WhatsApp")');
            const originalText = btn.text();
            btn.text('Generando enlace...').prop('disabled', true);

            $.ajax({
                url: `${API_URL}/checkout/whatsapp/`,
                method: 'GET',
                success: function (response) {
                    if (response.whatsapp_url) {
                        window.open(response.whatsapp_url, '_blank');
                    } else {
                        alert('Error al generar la cotización. Inténtalo nuevamente.');
                    }
                },
                error: function (xhr) {
                    alert(xhr.responseJSON?.error || 'Error de conexión al generar la cotización.');
                },
                complete: function () {
                    // Restaurar botón
                    btn.text(originalText).prop('disabled', false);
                }
            });
        }
    </script>
</body>

</html>
