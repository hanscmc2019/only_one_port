<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <title>EShopper - Iniciar Sesión</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="tienda, ecommerce, productos" name="keywords">
    <meta content="Tienda EShopper" name="description">

    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/style.css" rel="stylesheet">
    <link href="css/theme.css" rel="stylesheet">
</head>

<body>
    <div id="topbar-placeholder"></div>


    <div id="navbar-placeholder"></div>


    <!-- Page Header Start -->
    <div class="container-fluid bg-secondary mb-5">
        <div class="d-flex flex-column align-items-center justify-content-center" style="min-height: 150px">
            <h1 class="font-weight-semi-bold text-uppercase mb-3">Iniciar Sesión</h1>
            <div class="d-inline-flex">
                <p class="m-0"><a href="">Inicio</a></p>
                <p class="m-0 px-2">-</p>
                <p class="m-0">Login</p>
            </div>
        </div>
    </div>
    <!-- Page Header End -->


    <!-- Login Start -->
    <div class="container-fluid pt-5">
        <div class="row px-xl-5 justify-content-center">
            <div class="col-lg-5 mb-5">
                <div class="contact-form shadow p-4 bg-white">
                    <div id="login-error" class="alert alert-danger d-none">Credenciales inválidas</div>
                    <form id="loginForm">
                        <div class="control-group mb-3">
                            <label>Usuario</label>
                            <input type="text" class="form-control py-4" id="username" placeholder="Tu Usuario"
                                required="required" />
                        </div>
                        <div class="control-group mb-4">
                            <label>Contraseña</label>
                            <input type="password" class="form-control py-4" id="password" placeholder="Tu Contraseña"
                                required="required" />
                        </div>
                        <div>
                            <button class="btn btn-primary btn-block border-0 py-3 font-weight-bold" type="submit"
                                id="btnLogin">Entrar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!-- Login End -->


    <div id="footer-placeholder"></div>


    <!-- Back to Top -->
    <a href="#" class="btn btn-primary back-to-top"><i class="fa fa-angle-double-up"></i></a>


    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
    <script src="lib/easing/easing.min.js"></script>
    <script src="lib/owlcarousel/owl.carousel.min.js"></script>

    <!-- Template Javascript -->
    <script src="js/main.js"></script>

    <script>
        $(document).ready(function () {
            $('#loginForm').on('submit', function (e) {
                e.preventDefault();
                $('#login-error').addClass('d-none');
                const btn = $('#btnLogin');
                btn.text('Cargando...').prop('disabled', true);

                $.ajax({
                    url: '/api/login/',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        username: $('#username').val(),
                        password: $('#password').val()
                    }),
                    success: function (res) {
                        localStorage.setItem('access_token', res.access);
                        localStorage.setItem('refresh_token', res.refresh);
                        localStorage.setItem('user_roles', JSON.stringify(res.roles));
                        localStorage.setItem('username', res.username);
                        window.location.href = 'index.html';
                    },
                    error: function () {
                        $('#login-error').removeClass('d-none');
                        btn.text('Entrar').prop('disabled', false);
                    }
                });
            });
        });
    </script>
    <script src="js/load_components.js"></script>
</body>

</html>
