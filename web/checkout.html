<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <title>EShopper - Confirmar Pedido</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="tienda, ecommerce, productos" name="keywords">
    <meta content="Confirmación de pedido EShopper" name="description">

    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/style.css" rel="stylesheet">
    <link href="css/theme.css" rel="stylesheet">
</head>

<body>
    <div id="topbar-placeholder"></div>


    <div id="navbar-placeholder"></div>


    <!-- Page Header Start -->
    <div class="container-fluid bg-secondary mb-5">
        <div class="d-flex flex-column align-items-center justify-content-center" style="min-height: 150px">
            <h1 class="font-weight-semi-bold text-uppercase mb-3">Confirmar Pedido</h1>
            <div class="d-inline-flex">
                <p class="m-0"><a href="index.html">Inicio</a></p>
                <p class="m-0 px-2">-</p>
                <p class="m-0">Confirmar Pedido</p>
            </div>
        </div>
    </div>
    <!-- Page Header End -->


    <!-- Checkout Start -->
    <div class="container-fluid pt-5">
        <div class="row px-xl-5">
            <!-- Resumen de productos -->
            <div class="col-lg-8">
                <h4 class="font-weight-semi-bold mb-4">Resumen de tu pedido</h4>
                <div class="table-responsive">
                    <table class="table">
                        <thead class="bg-secondary text-dark">
                            <tr>
                                <th>Producto</th>
                                <th class="text-center">Cantidad</th>
                                <th class="text-right">Precio</th>
                                <th class="text-right">Subtotal</th>
                            </tr>
                        </thead>
                        <tbody id="checkout-products">
                            <tr>
                                <td colspan="4" class="text-center py-4">
                                    <i class="fa fa-spinner fa-spin text-primary"></i> Cargando...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Total y confirmación -->
            <div class="col-lg-4">
                <div class="card border-secondary mb-5">
                    <div class="card-header bg-secondary border-0">
                        <h4 class="font-weight-semi-bold m-0">Total del Pedido</h4>
                    </div>
                    <div class="card-body">
                        <div class="d-flex justify-content-between mb-3 pt-1">
                            <h6 class="font-weight-medium">Subtotal</h6>
                            <h6 class="font-weight-medium" id="checkout-subtotal">S/ 0</h6>
                        </div>
                        <p class="text-muted small mb-0">
                            El envío y la forma de pago se coordinan directamente por WhatsApp.
                        </p>
                    </div>
                    <div class="card-footer border-secondary bg-transparent">
                        <div class="d-flex justify-content-between mt-2">
                            <h5 class="font-weight-bold">Total</h5>
                            <h5 class="font-weight-bold" id="checkout-total">S/ 0</h5>
                        </div>
                    </div>
                </div>
                <button class="btn btn-lg btn-block btn-primary font-weight-bold my-3 py-3"
                    id="btn-whatsapp" onclick="checkoutWhatsApp()">
                    <i class="fab fa-whatsapp mr-2"></i>Confirmar por WhatsApp
                </button>
                <a href="cart.html" class="btn btn-block btn-outline-secondary">Volver al carrito</a>
            </div>
        </div>
    </div>
    <!-- Checkout End -->


    <div id="footer-placeholder"></div>


    <!-- Back to Top -->
    <a href="#" class="btn btn-primary back-to-top"><i class="fa fa-angle-double-up"></i></a>


    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
    <script src="lib/easing/easing.min.js"></script>
    <script src="lib/owlcarousel/owl.carousel.min.js"></script>


    <!-- Template Javascript -->
    <script src="js/main.js"></script>
    <script src="js/load_components.js"></script>

    <!-- Script para Confirmación de Pedido -->
    <script>
        const API_URL = '/api';

        $(document).ready(function () {
            loadCheckoutCart();
        });

        function loadCheckoutCart() {
            $.ajax({
                url: `${API_URL}/cart/`,
                method: 'GET',
                success: function (cart) {
                    renderCheckout(cart);
                },
                error: function (xhr) {
                    $('#checkout-products').html('<tr><td colspan="4" class="text-center text-danger py-4">Error al cargar el pedido.</td></tr>');
                }
            });
        }

        function renderCheckout(cart) {
            const tbody = $('#checkout-products');
            tbody.empty();

            if (!cart.items || cart.items.length === 0) {
                tbody.html('<tr><td colspan="4" class="text-center py-4">Tu carrito está vacío. <a href="index.html">Ir de compras</a></td></tr>');
                $('#checkout-subtotal').text('S/ 0');
                $('#checkout-total').text('S/ 0');
                $('#btn-whatsapp').prop('disabled', true);
                return;
            }

            cart.items.forEach(item => {
                const row = `
                    <tr>
                        <td class="align-middle">${item.product_name}</td>
                        <td class="align-middle text-center">${item.quantity}</td>
                        <td class="align-middle text-right">S/ ${item.price}</td>
                        <td class="align-middle text-right">S/ ${item.subtotal}</td>
                    </tr>
                `;
                tbody.append(row);
            });

            const total = cart.total;
            $('#checkout-subtotal').text(`S/ ${total}`);
            $('#checkout-total').text(`S/ ${total}`);
        }

        function checkoutWhatsApp() {
            const btn = $('#btn-whatsapp');
            const original = btn.html();
            btn.html('<i class="fa fa-spinner fa-spin mr-2"></i>Generando enlace...').prop('disabled', true);

            $.ajax({
                url: `${API_URL}/checkout/whatsapp/`,
                method: 'GET',
                success: function (response) {
                    if (response.whatsapp_url) {
                        window.open(response.whatsapp_url, '_blank');
                    } else {
                        alert('Error al generar la cotización. Inténtalo nuevamente.');
                    }
                },
                error: function (xhr) {
                    alert(xhr.responseJSON?.error || 'Error de conexión al generar la cotización.');
                },
                complete: function () {
                    btn.html(original).prop('disabled', false);
                }
            });
        }
    </script>
</body>

</html>
