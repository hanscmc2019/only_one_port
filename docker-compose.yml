services:
  # ──────────────────────────────────────────────
  # NGINX - Servidor de archivos estáticos + reverse proxy
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ${CLIENT_NAME}_nginx
    ports:
      - "${WEB_PORT}:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./media:/usr/share/nginx/media:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

  # ──────────────────────────────────────────────
  # POSTGRESQL - Base de datos del e-commerce (public + bot_data + n8n)
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ${CLIENT_NAME}_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ:-America/Lima}
    # Zona horaria del servidor: define la hora de pared que guardan las columnas
    # `timestamp` por CURRENT_TIMESTAMP/NOW() (orders, Inventory, chat, approve_payment).
    command: [ "postgres", "-c", "timezone=${TZ:-America/Lima}" ]
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  # ──────────────────────────────────────────────
  # BACKEND - API Python (Django)
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${CLIENT_NAME}_backend
    env_file:
      - .env
    environment:
      TZ: ${TZ:-America/Lima}
    volumes:
      - ./backend:/app
      - ./media:/app/media
    # ports:
    #   - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

