# La red y los volúmenes llevan el prefijo ${CLIENT_NAME} para que varios
# stacks (uno por cliente) convivan en el mismo servidor sin colisionar.
networks:
  app-network:
    name: ${CLIENT_NAME}_app-network
    driver: bridge

