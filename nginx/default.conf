server {
    listen 80;
    server_name localhost;

    # Archivos estáticos (HTML, CSS, JS, imágenes)
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy inverso hacia el backend Python
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Code-server IDE - accesible en /code/
    location /code/ {
        proxy_pass http://code-server:8443/code/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Headers obligatorios para WebSocket (terminal, live reload)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Evitar timeout en conexiones largas del IDE
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
