server {
    listen 80;
    server_name localhost;

    server_tokens off;                          # Oculta la versión de nginx
    client_max_body_size 10M;                   # Permite subir imágenes de producto vía /api/

    # Headers de seguridad globales
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Compresión
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Bloquear fuentes, backups y archivos ocultos que no deben servirse
    location ~* \.(php|scss|ori\.html)$ { deny all; return 404; }
    location ~ /\.                       { deny all; return 404; }   # .git, .gitattributes, etc.
    location ~* /(READ-ME|LICENSE)\.txt$ { deny all; return 404; }

    # Archivos estáticos (HTML, CSS, JS, imágenes)
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ =404;
    }

    # Media files (imágenes subidas)
    location /media/ {
        alias /usr/share/nginx/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Proxy inverso hacia el backend Python
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Panel de administración de Django
    # Para restringir por IP en producción, descomentar:
    #   allow 1.2.3.4;
    #   deny all;
    location /admin/ {
        proxy_pass http://backend:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Archivos estáticos de Django (para el panel de admin)
    location /static/ {
        proxy_pass http://backend:8000/static/;
    }
}
